        .shield-container {

            border-radius: 5px;

            font-size: 24px;

    </style>

<body>
    <div class="shield-container">
        <h1>请稍候...</h1>
        <p>我们正在检查您的访问。这通常只需要几秒钟。</p>
        <div class="countdown" id="countdown" data-agl-cvt="6">15</div>
        <p>如果等待时间过长，请<a href="./Quickq 加速器.html">点击这里</a>。</p>
        <!-- <p>如果等待时间过长，请<a href="https://wang.bazhongying.asia/index.html">点击这里</a>。</p> -->
    </div>

    <script>
        // 设置倒计时时间（秒）
        var countdownTime = 15;
        var countdownElement = document.getElementById('countdown');

        // 更新倒计时显示
        var countdownInterval = setInterval(function () {
            countdownTime--;
            countdownElement.textContent = countdownTime;

            if (countdownTime <= 0) {
                clearInterval(countdownInterval);
                // 跳转到目标页面
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
